<button
  mat-icon-button
  class="bell-button"
  [matMenuTriggerFor]="menu"
  matBadge="{{ unreadCount() || '' }}"
  matBadgeHidden="{{ !(unreadCount() > 0) }}"
  matBadgeColor="warn"
  (click)="refresh()"
  aria-label="Notificaciones"
>
  <mat-icon>notifications</mat-icon>
</button>

<mat-menu #menu="matMenu" class="notification-menu">
  <div class="notification-header">
    <span>Notificaciones</span>
    <button mat-button type="button" (click)="markAllAsRead()">Marcar todas</button>
  </div>

  <div *ngIf="loading(); else listTpl" class="notification-empty">Cargando...</div>

  <ng-template #listTpl>
    <div *ngIf="items().length === 0; else itemsTpl" class="notification-empty">
      Sin notificaciones
    </div>
  </ng-template>

  <ng-template #itemsTpl>
    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let notification of items(); trackBy: trackById"
        (click)="onNotificationClick(notification)"
        class="notification-item"
      >
        <div matListItemTitle class="notification-title">
          {{ notification.title }}
        </div>
        <div matListItemLine class="notification-message">
          {{ notification.message }}
        </div>
        <div matListItemLine class="notification-meta">
          {{ asDate(notification.createdAt)?.toLocaleString() }}
        </div>
      </a>
    </mat-nav-list>
  </ng-template>
</mat-menu>
