version: "3.9"

services:
  # 🌐 Frontend GESCOMPH - Desarrollo
  gescomph-front-develop:
    container_name: ${CONTAINER_NAME}
    build:
      context: ../..   # raíz del proyecto Angular
      dockerfile: Dockerfile
    image: ${IMAGE_NAME}:latest
    restart: always
    ports:
      - "4200:${PORT}"           # 4200 host → 80 contenedor
    env_file:
      - .env
    networks:
      - gescomph_network          # 👈 valor literal, no variable
    labels:
      - com.gescomph.environment=develop

# 🔗 Red externa compartida con backend
networks:
  gescomph_network:
    external: true
